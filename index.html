<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأجير سوني - كويت</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pop { 0% { transform: scale(0.9); } 100% { transform: scale(1); } }
        .animate-pop { animation: pop 0.3s ease-out; }
    </style>
</head>
<body class="bg-gray-900 text-white p-4">

    <div class="max-w-md mx-auto">
        <h1 class="text-3xl font-bold text-center mb-6 text-yellow-500">🎮 تأجير أجهزة سوني</h1>

        <div id="bookingForm" class="bg-gray-800 p-6 rounded-2xl shadow-xl animate-pop">
            <label class="block mb-2 font-bold">نوع الجهاز:</label>
            <select id="deviceType" class="w-full p-3 rounded-lg bg-gray-700 mb-4 border border-gray-600">
                <option value="2">سوني 5 (2 د.ك / ساعة)</option>
                <option value="1">سوني 4 (1 د.ك / ساعة)</option>
            </select>

            <label class="block mb-2 font-bold">عدد الساعات:</label>
            <input type="number" id="hours" value="1" min="1" class="w-full p-3 rounded-lg bg-gray-700 mb-6 border border-gray-600 outline-none focus:border-yellow-500">
            
            <button onclick="calculate()" class="w-full bg-yellow-500 text-gray-900 py-4 rounded-lg font-bold text-lg hover:bg-yellow-400 transition">عرض الفاتورة</button>
        </div>

        <div id="invoice" class="hidden bg-white text-gray-900 p-6 rounded-2xl shadow-lg mt-4 animate-pop">
            <h2 class="text-2xl font-bold mb-4 text-center">الفاتورة 🧾</h2>
            <div id="billDetails" class="space-y-3 text-lg"></div>
            <button onclick="location.reload()" class="mt-6 w-full bg-gray-200 py-3 rounded-lg font-bold">حجز جديد</button>
        </div>
    </div>

    <script>
        function calculate() {
            const devicePrice = parseInt(document.getElementById('deviceType').value);
            const hours = parseInt(document.getElementById('hours').value);
            let total = hours * devicePrice;
            let discountInfo = "";

            // تطبيق خصم الثلث إذا كانت الساعات 11 أو أكثر
            if (hours >= 11) {
                total = total * (2/3); 
                discountInfo = `<p class="text-green-600 font-bold">✅ خصم خاص (ثلث السعر): ${Math.round(total)} د.ك</p>`;
            }

            document.getElementById('bookingForm').classList.add('hidden');
            const inv = document.getElementById('invoice');
            inv.classList.remove('hidden');
            
            document.getElementById('billDetails').innerHTML = `
                <p>الجهاز: ${devicePrice === 2 ? 'سوني 5' : 'سوني 4'}</p>
                <p>عدد الساعات: ${hours}</p>
                ${discountInfo}
                <p class="text-3xl font-bold mt-4 text-yellow-600">الإجمالي: ${total.toFixed(2)} د.ك</p>
                <p class="text-sm mt-4 text-gray-500 italic">* الدفع كاش عند الاستلام</p>
            `;
        }
    </script>
</body>
</html>
